version: "3.8"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: college-event-analytics
    ports:
      - "8501:8501"
    volumes:
      - ./database:/app/database
      - ./uploads:/app/uploads
      - ./exports:/app/exports
    environment:
      - STREAMLIT_SERVER_HEADLESS=true
      - STREAMLIT_BROWSER_GATHER_USAGE_STATS=false
    restart: unless-stopped
